ak47:
  display-name: '&cAK-47'
  type: RIFLE
  rarity: UNCOMMON
  price: 3000.0
  # ダメージ
  damage: 18.0
  headshot-multiplier: 2.0
  body-multiplier: 1.0
  leg-multiplier: 0.75
  armor-penetration: 0.1
  # 射撃
  fire-mode: AUTO
  fire-rate: 100
  magazine-size: 30
  reserve-ammo: 90
  # 弾道
  bullet-speed: 6.0
  range: 60.0
  drop-off: 0.08
  bullet-count: 1
  spread-angle: 1.5
  # リコイル
  recoil: 0.8
  recoil-vertical: 0.5
  recoil-horizontal: 0.2
  recoil-recovery: 0.7
  # リロード
  reload-time: 2500
  tactical-reload-time: 2000
  # ADS
  ads-speed-multiplier: 0.65
  ads-accuracy: 0.85
  # サウンド
  shoot-sound: ENTITY_GENERIC_EXPLODE
  shoot-sound-volume: 0.4
  shoot-sound-pitch: 1.8
  suppressor: false

