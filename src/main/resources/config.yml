# ==============================
# WarforgeCore 設定ファイル
# ==============================

# データベース設定
database:
  host: localhost
  port: 3306
  name: warforge
  username: root
  password: password
  pool-size: 10

# 基本設定
settings:
  debug: false
  language: ja
  prefix: '&f&l[&6&lWarForgeCore&f&l] &r'

# ==============================
# ロビー設定
# ==============================
lobby:
  countdown: 30
  countdown-full: 10
  countdown-notify: [10, 5, 4, 3, 2, 1]

# ==============================
# ゲーム共通設定
# ==============================
game:
  respawn-delay: 3
  max-players-per-arena: 16
  min-players-to-start: 2
  block-break: false
  block-place: false
  hunger: false
  drop-items-on-death: false
  keep-inventory: true

# ==============================
# ゲームモード別設定
# ==============================
modes:
  tdm:
    duration: 300
    kill-limit: 30
    respawn-delay: 3

  battle-royale:
    duration: 600
    respawn-delay: 0

  domination:
    duration: 300
    max-score: 200
    capture-speed: 0.05
    score-per-tick: 1
    respawn-delay: 3

  gold-rush:
    duration: 240
    gold-spawn-interval: 20
    kill-drop-rate: 0.65
    announce-interval: 30
    respawn-delay: 3

  heist:
    duration: 300
    win-gold: 100
    gold-per-mine: 5
    kill-drop-rate: 0.65
    respawn-delay: 3

# ==============================
# Vault経済設定（円）
# ==============================
economy:
  enabled: true
  currency-symbol: '¥'
  rewards:
    kill: 500.0
    headshot-bonus: 200.0
    assist: 100.0
    participation: 200.0
    heist-deposit-per-gold: 50.0
    win:
      tdm: 2000.0
      battle-royale: 5000.0
      domination: 2000.0
      gold-rush: 3000.0
      heist: 4000.0

# ==============================
# UIメッセージ設定
# ==============================
messages:
  game-start: '&a&l試合開始！ &7モード: &f{mode}'
  game-end: '&6&l試合終了！'
  player-join: '&f{player} &7が参加！ &e{current}/{max}'
  player-leave: '&f{player} &7が退出。'
  countdown-start: '&a試合が &e{seconds}秒 &a後に始まります！'
  countdown-cancel: '&c人数が足りないためカウントダウンをキャンセルしました。'
  kill-message: '&c{victim} &7が &a{killer} &7に倒された{headshot}'
  headshot-suffix: ' &6[HEADSHOT]'
  respawn-message: '&aリスポーン！'

# ==============================
# スコアボード表示設定
# ==============================
scoreboard:
  enabled: true
  title: '&6&l✦ WarForgeCore ✦'

# ==============================
# アクションバー設定
# ==============================
actionbar:
  enabled: true
  game-format: '&f&l⏱ &e{time}  &7| &f&lKill &a{kills}  &f&lDeath &c{deaths}  &f&lKDR &6{kdr}'
  lobby-format: '&f&lKill &a{kills}  &f&lDeath &c{deaths}  &f&lKDR &6{kdr}'

# ==============================
# ボスバー設定
# ==============================
bossbar:
  enabled: true

# ==============================
# ランク設定
# ==============================
rank:
  enabled: true
  points:
    win: 25
    loss: -15
    kill: 3
    mvp-bonus: 10

# ==============================
# キルストリーク設定
# ==============================
killstreak:
  enabled: true

# ==============================
# ミッション設定
# ==============================
missions:
  enabled: true
  daily-count: 3

# ==============================
# 観戦設定
# ==============================
spectator:
  enabled: true
  allow-chat: false

# ==============================
# 投票設定
# ==============================
vote:
  enabled: true
  duration: 30

# ==============================
# ログ設定
# ==============================
logging:
  enabled: true
  kills: true
  economy: true
  games: true

# ==============================
# WeaponMechanics統合設定
# ==============================
weapon-mechanics:
  enabled: true
  # WeaponMechanicsプラグインの武器をそのまま使用
  # キットシステムなし: 各プレイヤーが自分の武器を持参
