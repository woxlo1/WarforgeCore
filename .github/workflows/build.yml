name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        minecraft: [ "1.16.5", "1.17.1", "1.18.2", "1.19.4", "1.20.4", "1.21.1" ]
      fail-fast: false

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # GitHub Packages へ publish する際に使用
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build with Maven (MC ${{ matrix.minecraft }})
        run: mvn -B package --no-transfer-progress -DskipTests -Dminecraft.version=${{ matrix.minecraft }}

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarforgeCore-${{ github.sha }}-mc${{ matrix.minecraft }}
          path: target/WarforgeCore-*.jar
          retention-days: 30

      # -------------------------------------------------------
      # GitHub Packages (Maven) への publish
      # main ブランチへの push 時のみ実行
      # 準備ができたら if: コメントを外す
      # -------------------------------------------------------
      # - name: Publish to GitHub Packages
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   run: mvn -B deploy --no-transfer-progress -DskipTests
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
