name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        minecraft: [ "1.16.5", "1.17.1", "1.18.2", "1.19.4", "1.20.4", "1.21.1" ]
      fail-fast: false

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (MC ${{ matrix.minecraft }})
        run: ./gradlew build -PminecraftVersion=${{ matrix.minecraft }}

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarforgeCore-${{ github.sha }}-mc${{ matrix.minecraft }}
          path: build/libs/WarforgeCore-*.jar
          retention-days: 30

      # -------------------------------------------------------
      # GitHub Packages への publish
      # main ブランチへの push 時のみ実行
      # 準備ができたら if: コメントを外す
      # -------------------------------------------------------
